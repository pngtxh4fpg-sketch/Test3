<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CesiumJS 3D GPS Test</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      background: #000;
    }
    #status {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background: rgba(0,0,0,0.7); color: white; padding: 10px;
      border-radius: 8px; font-family: sans-serif; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="status">Suche GPS Signal...</div>
  <div id="cesiumContainer"></div>

  <script>
    // 1. Initialisierung des 3D Viewers
    // Hinweis: Für echtes Terrain/Satellitendetails benötigst du später einen kostenlosen 'Ion Token'.
    // Hier nutzen wir Standard-Einstellungen zum Testen.
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain(), // Aktiviert 3D Berge/Gelände
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      infoBox: false,
      navigationHelpButton: false,
      sceneModePicker: false,
      timeline: false,
      animation: false
    });

    // 2. Erstellen eines Markers für den Nutzer
    const userEntity = viewer.entities.add({
      point: {
        pixelSize: 15,
        color: Cesium.Color.AZURE,
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 3
      },
      label: {
        text: 'Deine Position',
        font: '14pt sans-serif',
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -20)
      }
    });

    let firstLock = true;

    // 3. GPS Standort abfragen
    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const alt = pos.coords.altitude || 0; // GPS Höhe falls verfügbar

        const position = Cesium.Cartesian3.fromDegrees(lon, lat, alt);

        // Marker positionieren
        userEntity.position = position;

        document.getElementById('status').innerText = `GPS Aktiv: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;

        // Beim ersten Mal zur Position "fliegen" und Kamera neigen
        if (firstLock) {
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 1000), // 1km Höhe
            orientation: {
              heading: Cesium.Math.toRadians(0),
              pitch: Cesium.Math.toRadians(-35), // Kamera nach vorne neigen für 3D Effekt
              roll: 0.0
            }
          });
          firstLock = false;
        }
      }, err => {
        document.getElementById('status').innerText = "GPS Fehler: " + err.message;
      }, {
        enableHighAccuracy: true
      });
    } else {
      document.getElementById('status').innerText = "GPS nicht unterstützt.";
    }
  </script>
</body>
</html>
