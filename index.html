<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cesium 3D Fix</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      background: #000;
    }
    #ui {
      position: absolute; top: 15px; left: 15px; z-index: 10;
      background: rgba(0,0,0,0.85); color: #00ff00; padding: 15px;
      border-radius: 12px; font-family: 'Courier New', monospace; font-size: 12px;
      border: 1px solid #333; pointer-events: none; max-width: 80%;
    }
    .error { color: #ff453a; }
  </style>
</head>
<body>

  <div id="ui">
    <div>[STATUS] <span id="status">Initialisiere...</span></div>
    <div>[LAT] <span id="lat">-</span></div>
    <div>[LON] <span id="lon">-</span></div>
    <div id="log" class="error"></div>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    // FIX 1: Wir nutzen einen freien Imagery Provider (OSM), 
    // damit die Karte auch OHNE Ion-Token erscheint.
    const osm = new Cesium.OpenStreetMapImageryProvider({
        url : 'https://a.tile.openstreetmap.org/'
    });

    try {
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: osm,
            terrainProvider: Cesium.createWorldTerrain(), // 3D Gelände
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            navigationHelpButton: false,
            sceneModePicker: true, // Erlaubt Wechsel zwischen 2D/3D
            timeline: false,
            animation: false,
            requestRenderMode: true // Spart Akku
        });

        // Blauer Punkt für deine Position
        const userMarker = viewer.entities.add({
            point: {
                pixelSize: 18,
                color: Cesium.Color.fromCssColorString('#0a84ff'),
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 3
            }
        });

        let hasFoundLocation = false;

        // GPS Logik
        if ("geolocation" in navigator) {
            document.getElementById('status').innerText = "Suche Satelliten...";
            
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, altitude } = pos.coords;
                
                document.getElementById('status').innerText = "GPS Aktiv";
                document.getElementById('lat').innerText = latitude.toFixed(6);
                document.getElementById('lon').innerText = longitude.toFixed(6);
                document.getElementById('log').innerText = "";

                const position = Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude || 0);
                userMarker.position = position;

                if (!hasFoundLocation) {
                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(longitude, latitude, 1500), // 1.5km Höhe
                        orientation: {
                            pitch: Cesium.Math.toRadians(-30) // Neigung für 3D Effekt
                        }
                    });
                    hasFoundLocation = true;
                }
            }, err => {
                let msg = "GPS Fehler: ";
                if (err.code === 1) msg += "Zugriff verweigert. Nutze HTTPS!";
                if (err.code === 2) msg += "Position nicht gefunden.";
                if (err.code === 3) msg += "Timeout.";
                document.getElementById('log').innerText = msg;
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        } else {
            document.getElementById('log').innerText = "Browser unterstützt kein GPS.";
        }

    } catch (e) {
        document.getElementById('log').innerText = "Cesium Error: " + e.message;
    }
  </script>
</body>
</html>
